{% extends "admin/base.html" %}
{% block title %}Edit Project{% endblock %}
{% block page_title %}Edit Project{% endblock %}

{% block content %}
<div class="admin-section">
  <form method="POST" action="{{ url_for('admin.project_edit', project_id=project.id) }}" class="admin-form">
    <div class="form-row">
      <div class="form-group">
        <label>Title <span class="req">*</span></label>
        <input type="text" name="title" value="{{ project.title }}" required />
      </div>
      <div class="form-group">
        <label>Tagline</label>
        <input type="text" name="tagline" value="{{ project.tagline }}" />
      </div>
    </div>
    <div class="form-group">
      <label>Description <span class="req">*</span></label>
      <textarea name="description" required rows="5">{{ project.description }}</textarea>
    </div>
    <div class="form-group">
      <label>Tech Stack (comma-separated)</label>
      <input type="text" name="tech_stack" value="{{ project.tech_stack }}" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>GitHub URL</label>
        <input type="url" name="github_url" value="{{ project.github_url }}" />
      </div>
      <div class="form-group">
        <label>Demo URL</label>
        <input type="url" name="demo_url" value="{{ project.demo_url }}" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Image URL</label>
        <input type="url" name="image_url" value="{{ project.image_url }}" />
      </div>
      <div class="form-group">
        <label>Order</label>
        <input type="number" name="order" value="{{ project.order }}" />
      </div>
    </div>
    <div class="form-group form-group--check">
      <label><input type="checkbox" name="is_featured" {% if project.is_featured %}checked{% endif %}/> Featured</label>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn--primary">Update Project</button>
      <a href="{{ url_for('admin.projects') }}" class="btn btn--ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
