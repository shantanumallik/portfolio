{% extends "admin/base.html" %}
{% block title %}Edit Skill{% endblock %}
{% block page_title %}Edit Skill{% endblock %}

{% block content %}
<div class="admin-section">
  <form method="POST" action="{{ url_for('admin.skill_edit', skill_id=skill.id) }}" class="admin-form">
    <div class="form-row">
      <div class="form-group">
        <label>Skill Name <span class="req">*</span></label>
        <input type="text" name="name" value="{{ skill.name }}" required />
      </div>
      <div class="form-group">
        <label>Category <span class="req">*</span></label>
        <input type="text" name="category" value="{{ skill.category }}" required />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Proficiency (0–100)</label>
        <input type="number" name="proficiency" min="0" max="100" value="{{ skill.proficiency }}" />
      </div>
      <div class="form-group">
        <label>Order</label>
        <input type="number" name="order" value="{{ skill.order }}" />
      </div>
    </div>
    <div class="form-group form-group--check">
      <label><input type="checkbox" name="is_featured" {% if skill.is_featured %}checked{% endif %}/> Featured</label>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn--primary">Update Skill</button>
      <a href="{{ url_for('admin.skills') }}" class="btn btn--ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
