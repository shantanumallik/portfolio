services:
  - type: web
    name: portfolio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python deploy_seed.py && gunicorn run:app --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
